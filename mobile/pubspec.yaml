name: mobile
description: "Souk Tchad — marketplace au Tchad."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  audioplayers: ^6.4.0
  dio: ^5.9.2
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_image_compress: ^2.4.0
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^9.2.4
  go_router: ^17.3.0
  google_mobile_ads: ^8.0.0
  google_sign_in: ^7.2.0
  google_sign_in_web: ^1.1.3
  image_picker: ^1.2.2
  intl: ^0.20.2
  path: ^1.9.1
  path_provider: ^2.1.5
  record: ^6.1.0
  shared_preferences: ^2.5.5
  socket_io_client: ^3.1.4
  sqflite: ^2.4.2+1
  url_launcher: ^6.3.2
  video_player: ^2.10.0
  file_picker: ^11.0.2
  speech_to_text: ^7.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icon/app_icon.png
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/icon/app_icon.png
    background_color: "#002663"
    theme_color: "#002663"
  macos:
    generate: true
    image_path: assets/icon/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/icon/app_icon.png
